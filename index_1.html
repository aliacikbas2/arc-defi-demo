<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>tARC/tUSD — Testnet DeFi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
  :root{
    --ink:#0b1a2b;
    --paper:#eef2f7;
    --moss:#0a5cd8;
    --moss-deep:#083a8c;
    --copper:#1f7ae0;
    --line: rgba(11,26,43,0.14);
    --ok:#0a5cd8;
    --err:#c2402b;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: 'Fraunces', Georgia, serif;
  }
  @font-face{ font-family:'Fraunces'; src:local('Georgia'); font-weight: 400 900; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family: var(--mono); font-size:14px; line-height:1.5;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(11,26,43,0.06) 1px, transparent 0),
      linear-gradient(160deg, rgba(10,92,216,0.07), rgba(238,242,247,0) 55%);
    background-size: 22px 22px, 100% 100%;
  }
  a{color:var(--moss-deep);}
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--ink); padding-bottom:18px;margin-bottom:28px;
    flex-wrap:wrap; gap:16px;
  }
  .brand{display:flex;flex-direction:column;gap:6px;}
  .brand .tag{ text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--moss-deep); }
  h1{ font-family:var(--serif); font-weight:800; font-size:42px; margin:0; letter-spacing:-0.01em; }
  h1 .slash{color:var(--copper);}
  .subtitle{color:#4b5a52;font-size:13px;max-width:46ch;}

  .toprow{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .langbar{display:flex; flex-wrap:wrap; border:1px solid var(--ink); width:fit-content;}
  .langbar button{
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    background:var(--paper); border:none; padding:6px 9px; cursor:pointer; color:var(--ink);
  }
  .langbar button.active{background:var(--ink); color:var(--paper);}
  .langbar button + button{border-left:1px solid var(--ink);}

  #connectBtn{
    font-family:var(--mono); background:var(--ink); color:var(--paper);
    border:none; padding:12px 20px; font-size:13px; cursor:pointer; letter-spacing:.03em;
    text-transform:uppercase;
  }
  #connectBtn:hover{background:var(--moss-deep);}
  #connectBtn:disabled{opacity:.5;cursor:default;}
  .acct{ font-size:12px; color:var(--moss-deep); text-align:right; }
  .acct .netbadge{
    display:inline-block; margin-top:4px; padding:2px 8px;
    border:1px solid var(--moss); font-size:10px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--moss);
  }
  .acct .netbadge.bad{border-color:var(--err); color:var(--err);}

  .balances{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:1px; background:var(--ink); border:1px solid var(--ink); margin-bottom:36px;
  }
  .balcell{background:var(--paper); padding:16px 18px;}
  .balcell .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#6b7a72;}
  .balcell .val{ font-family:var(--serif); font-size:26px; font-weight:700; margin-top:4px; }

  .section{ border:1px solid var(--ink); margin-bottom:22px; background:#f7f9fc; }
  .section .head{
    display:flex; align-items:baseline; gap:10px;
    padding:14px 18px; border-bottom:1px solid var(--ink);
    background: linear-gradient(90deg, var(--ink), var(--moss-deep)); color:var(--paper);
  }
  .section .head .n{ font-family:var(--serif); font-size:13px; color:var(--copper); font-weight:700; }
  .section .head h2{ font-family:var(--serif); font-size:19px; margin:0; font-weight:700; }
  .section .head .desc{ margin-left:auto; font-size:11px; color:#cfd6cf; text-align:right; }
  .body{padding:18px;}
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
  .row:last-child{margin-bottom:0;}
  input[type=text], input[type=number]{
    font-family:var(--mono); font-size:13px; background:var(--paper); border:1px solid var(--ink);
    padding:10px 12px; flex:1; min-width:140px; color:var(--ink);
  }
  input::placeholder{color:#9aa79f;}
  button.act{
    font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.04em;
    background:transparent; color:var(--ink); border:1px solid var(--ink); padding:10px 16px; cursor:pointer;
  }
  button.act:hover{background:var(--ink); color:var(--paper);}
  button.act.primary{background:var(--moss); color:var(--paper); border-color:var(--moss);}
  button.act.primary:hover{background:var(--moss-deep); border-color:var(--moss-deep);}
  button.act:disabled{opacity:.4; cursor:default;}
  .hint{font-size:11px;color:#6b7a72;margin-top:8px;}
  .stat-line{
    display:flex; justify-content:space-between; font-size:12px; padding:5px 0;
    border-bottom:1px dashed var(--line);
  }
  .stat-line:last-child{border-bottom:none;}
  .stat-line .k{color:#6b7a72;}
  .stat-line .v{font-weight:600;}

  .lbtable{width:100%; border-collapse:collapse; font-size:12px;}
  .lbtable th{
    text-align:left; text-transform:uppercase; letter-spacing:.06em; font-size:10px;
    color:#6b7a72; padding:6px 8px; border-bottom:1px solid var(--ink);
  }
  .lbtable td{padding:7px 8px; border-bottom:1px dashed var(--line);}
  .lbtable tr:last-child td{border-bottom:none;}
  .lbtable .rank{font-family:var(--serif); font-weight:700; color:var(--moss);}
  .lbtable .addr{font-family:var(--mono);}
  .lbtable .you{background:rgba(10,92,216,0.08);}
  .lbloading{font-size:11px; color:#6b7a72; padding:6px 0;}

  .toggle{display:flex; border:1px solid var(--ink); width:fit-content; margin-bottom:14px;}
  .toggle button{
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    background:var(--paper); border:none; padding:8px 14px; cursor:pointer; color:var(--ink);
  }
  .toggle button.active{background:var(--ink); color:var(--paper);}

  #log{
    position:fixed; bottom:0; left:0; right:0; background:var(--ink); color:var(--paper);
    font-size:12px; padding:10px 20px; display:none; z-index:50;
  }
  #log.show{display:block;}
  #log.err{background:var(--err);}
  #log.ok{background:var(--moss-deep);}

  footer{
    margin-top:40px; padding-top:16px; border-top:1px solid var(--line);
    font-size:11px; color:#6b7a72; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  footer code{background:var(--line); padding:1px 5px;}

  @media (max-width:560px){
    h1{font-size:32px;}
    header{flex-direction:column; align-items:flex-start;}
    .acct{text-align:left;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="tag" data-i18n="tag"></div>
      <h1>tARC<span class="slash">/</span>tUSD</h1>
      <div class="subtitle" data-i18n="subtitle"></div>
    </div>
    <div class="toprow">
      <div class="langbar" id="langbar">
        <button data-lang="tr">TR</button>
        <button data-lang="en">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="de">DE</button>
        <button data-lang="zh">中文</button>
        <button data-lang="hi">हिं</button>
        <button data-lang="fr">FR</button>
        <button data-lang="sw">SW</button>
      </div>
      <button id="connectBtn" data-i18n="connect"></button>
      <div class="acct" id="acctInfo"></div>
    </div>
  </header>

  <div class="balances">
    <div class="balcell"><div class="lbl" data-i18n="balArc"></div><div class="val" id="balARC">—</div></div>

    <div class="balcell"><div class="lbl" data-i18n="balReward"></div><div class="val" id="balReward">—</div></div>
  </div>

  <!-- FAUCET -->
  <div class="section">

      <span class="n">00</span><h2 data-i18n="faucetTitle"></h2>
      <span class="desc" data-i18n="faucetDesc"></span>
    </div>
    <div class="body">
      <div class="row">
        <button class="act primary" id="btnClaim" data-i18n="claimBtn"></button>
        <span class="hint" id="claimStatus"></span>
      </div>
    </div>
  </div>

  <!-- STAKING -->
  <div class="section">
    <div class="head">
      <span class="n">01</span><h2 data-i18n="stakingTitle"></h2>
      <span class="desc" data-i18n="stakingDesc"></span>
    </div>
    <div class="body">
      <div class="row">
        <input type="number" id="stakeAmt" data-i18n-ph="amountArc" />
        <button class="act primary" id="btnStake" data-i18n="stakeBtn"></button>
        <button class="act" id="btnUnstake" data-i18n="unstakeBtn"></button>
      </div>
      <div class="stat-line"><span class="k" data-i18n="yourStaked"></span><span class="v" id="stStaked">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="pendingReward"></span><span class="v" id="stReward">—</span></div>
      <div class="hint" data-i18n="stakeHint"></div>
    </div>
  </div>

  <!-- LENDING -->
  <div class="section">
    <div class="head">
      <span class="n">02</span><h2 data-i18n="lendingTitle"></h2>
      <span class="desc" data-i18n="lendingDesc"></span>
    </div>
    <div class="body">
      <div class="row">
        <input type="number" id="collAmt" data-i18n-ph="collateralAmount" />
        <button class="act primary" id="btnDeposit" data-i18n="depositBtn"></button>
        <button class="act" id="btnWithdraw" data-i18n="withdrawBtn"></button>
      </div>
      <div class="row">
        <input type="number" id="borrowAmt" data-i18n-ph="amountArc" />
        <button class="act primary" id="btnBorrow" data-i18n="borrowBtn"></button>
        <button class="act" id="btnRepay" data-i18n="repayBtn"></button>
      </div>
      <div class="stat-line"><span class="k" data-i18n="yourCollateral"></span><span class="v" id="lnColl">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="yourDebt"></span><span class="v" id="lnBorrow">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="maxBorrow"></span><span class="v" id="lnMax">—</span></div>
    </div>
  </div>

  <!-- SWAP -->
  <div class="section">
    <div class="head">
      <span class="n">03</span><h2 data-i18n="swapTitle"></h2>
      <span class="desc" data-i18n="swapDesc"></span>
    </div>
    <div class="body">
      <div class="toggle">
        <button id="dirAtoB" class="active">tARC → tUSD</button>
        <button id="dirBtoA">tUSD → tARC</button>
      </div>
      <div class="row">
        <input type="number" id="swapAmt" data-i18n-ph="amountToGive" />
        <button class="act primary" id="btnSwap" data-i18n="swapBtn"></button>
      </div>
      <div class="stat-line"><span class="k" data-i18n="poolArc"></span><span class="v" id="swReserveA">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="poolUsd"></span><span class="v" id="swReserveB">—</span></div>
      <div class="hint" data-i18n="swapHint"></div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="section">
    <div class="head">
      <span class="n">04</span><h2 data-i18n="lbTitle"></h2>
      <span class="desc" data-i18n="lbDesc"></span>
    </div>
    <div class="body">
      <div class="lbloading" id="lbLoading" data-i18n="lbLoading"></div>
      <table class="lbtable" id="lbTable" style="display:none;">
        <thead>
          <tr>
            <th data-i18n="lbRank"></th>
            <th data-i18n="lbWallet"></th>
            <th data-i18n="lbActions"></th>
          </tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <span>Arc Network Testnet · Chain ID <code>5042002</code></span>
    <span>tARC <code>0xc59b…6811E</code> · tUSD <code>0xb0A5…4BFD</code> · Staking <code>0x4AC9…AB93</code> · Lending <code>0xB110…3774</code> · Swap <code>0x8d6A…9613</code></span>
  </footer>

</div>

let LANG = localStorage.getItem('lang') || 'tr';

function applyI18n(){
  const dict = I18N[LANG];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const key = el.getAttribute('data-i18n-ph');
    if(dict[key] !== undefined) el.setAttribute('placeholder', dict[key]);
  });
  document.querySelectorAll('#langbar button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang') === LANG);
  });
  document.documentElement.lang = LANG;
  if(account) updateAcctInfo();
}
document.getElementById('langbar').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  LANG = btn.getAttribute('data-lang');
  localStorage.setItem('lang', LANG);
  applyI18n();
});

const SWAP_ABI = [
  "function addLiquidity(uint256 amountA, uint256 amountB)",
  "function swapAforB(uint256 amountAIn)",
  "function swapBforA(uint256 amountBIn)",
  "function reserveA() view returns (uint256)",
  "function reserveB() view returns (uint256)",
  "function getAmountOut(uint256 amountIn, uint256 reserveIn, uint256 reserveOut) view returns (uint256)"
];
const FAUCET_ABI = [
  "function claim()",
  "function timeUntilNextClaim(address) view returns (uint256)"
];

/* Event signatures used only for leaderboard log scanning (topic0 hashes) */
const LB_EVENTS = [
  { addr: ADDR.Staking, sig: "Staked(address,uint256)" },
  { addr: ADDR.Staking, sig: "Unstaked(address,uint256,uint256)" },
  { addr: ADDR.Lending, sig: "Deposited(address,uint256)" },
  { addr: ADDR.Lending, sig: "Withdrawn(address,uint256)" },
  { addr: ADDR.Lending, sig: "Borrowed(address,uint256)" },
  { addr: ADDR.Lending, sig: "Repaid(address,uint256)" },
  { addr: ADDR.Swap, sig: "Swapped(address,address,uint256,uint256)" },
  { addr: ADDR.Faucet, sig: "Claimed(address,uint256,uint256,uint256)" }
];

let provider, signer, account;
let tARC, tUSD, staking, lending, swap, faucet;
let swapDir = "AtoB";
let lastNetworkOnArc = null;

/* ---------- Helpers ---------- */
function log(msg, type){
  const el = document.getElementById('log');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(window.__logT);
  window.__logT = setTimeout(()=>{ el.className=''; }, 7000);
}
function fmt(bn){
  try{ return Number(ethers.utils.formatUnits(bn, 18)).toLocaleString(undefined, {maximumFractionDigits: 4}); }
  catch(e){ return "—"; }
}
function toWei(v){ return ethers.utils.parseUnits(String(v || "0"), 18); }
async function ensureApproval(token, spender, amountWei, labelKey){
  const allowance = await token.allowance(account, spender);
  if(allowance.lt(amountWei)){
    log(I18N[LANG][labelKey] + I18N[LANG].approvingFor);
    const tx = await token.approve(spender, ethers.constants.MaxUint256);
    await tx.wait();
  }
}
function updateAcctInfo(){
  const acctInfo = document.getElementById('acctInfo');
  const short = account.slice(0,6) + "…" + account.slice(-4);
  acctInfo.innerHTML = short + '<br/><span class="netbadge ' + (lastNetworkOnArc?'':'bad') + '">' +
    (lastNetworkOnArc ? I18N[LANG].onArc : I18N[LANG].wrongNetwork) + '</span>';
}

/* ---------- Connection ---------- */
async function connect(){
  if(!window.ethereum){
    log(I18N[LANG].noWallet, "err");
    return;
  }
  try{
    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    account = await signer.getAddress();

    const network = await provider.getNetwork();
    lastNetworkOnArc = network.chainId === 5042002;
    updateAcctInfo();

    tARC    = new ethers.Contract(ADDR.tARC, ERC20_ABI, signer);
    tUSD    = new ethers.Contract(ADDR.tUSD, ERC20_ABI, signer);
    staking = new ethers.Contract(ADDR.Staking, STAKING_ABI, signer);
    lending = new ethers.Contract(ADDR.Lending, LENDING_ABI, signer);
    swap    = new ethers.Contract(ADDR.Swap, SWAP_ABI, signer);
    faucet  = new ethers.Contract(ADDR.Faucet, FAUCET_ABI, signer);

    document.getElementById('connectBtn').textContent = I18N[LANG].connected;
    document.getElementById('connectBtn').disabled = true;

    await refreshAll();
    await refreshClaimStatus();
    window.ethereum.on('accountsChanged', () => window.location.reload());
    window.ethereum.on('chainChanged', () => window.location.reload());
  }catch(e){
    log(I18N[LANG].connErr + (e.message || e), "err");
  }
}

/* ---------- Read data ---------- */
async function refreshAll(){
  if(!account) return;
  try{
    const [bArc, bUsd, staked, reward, coll, borrowed, factor, rA, rB] = await Promise.all([
      tARC.balanceOf(account),
      tUSD.balanceOf(account),
      staking.stakedBalance(account),
      staking.calculateReward(account),
      lending.collateralBalance(account),
      lending.borrowedBalance(account),
      lending.COLLATERAL_FACTOR(),
      swap.reserveA(),
      swap.reserveB()
    ]);

    document.getElementById('balARC').textContent = fmt(bArc);
    document.getElementById('balUSD').textContent = fmt(bUsd);
    document.getElementById('balStaked').textContent = fmt(staked);
    document.getElementById('balReward').textContent = fmt(reward);

    document.getElementById('stStaked').textContent = fmt(staked) + " tARC";
    document.getElementById('stReward').textContent = fmt(reward) + " tARC";

    document.getElementById('lnColl').textContent = fmt(coll) + " tARC";
    document.getElementById('lnBorrow').textContent = fmt(borrowed) + " tARC";
    const maxBorrow = coll.mul(factor).div(100);
    document.getElementById('lnMax').textContent = fmt(maxBorrow) + " tARC";

    document.getElementById('swReserveA').textContent = fmt(rA) + " tARC";
    document.getElementById('swReserveB').textContent = fmt(rB) + " tUSD";
  }catch(e){
    console.error(e);
  }
}

/* ---------- Faucet ---------- */
function fmtDuration(seconds){
  const s = Number(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  return h + I18N[LANG].hoursShort + " " + m + I18N[LANG].minutesShort;
}
async function refreshClaimStatus(){
  if(!account || !faucet) return;
  try{
    const wait = await faucet.timeUntilNextClaim(account);
    const statusEl = document.getElementById('claimStatus');
    const btn = document.getElementById('btnClaim');
    if(wait.eq(0)){
      statusEl.textContent = I18N[LANG].claimReady;
      btn.disabled = false;
    } else {
      statusEl.textContent = I18N[LANG].claimWait + fmtDuration(wait.toString());
      btn.disabled = true;
    }
  }catch(e){ console.error(e); }
}
async function doClaim(){
  if(!account){ log(I18N[LANG].noWallet, "err"); return; }
  try{
    log(I18N[LANG].claiming);
    const tx = await faucet.claim();
    await tx.wait();
    log(I18N[LANG].claimOk, "ok");
    await refreshAll();
    await refreshClaimStatus();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}

/* ---------- Leaderboard ---------- */
async function loadLeaderboard(){
  const loadingEl = document.getElementById('lbLoading');
  const tableEl = document.getElementById('lbTable');
  const bodyEl = document.getElementById('lbBody');
  try{
    const rp = provider || new ethers.providers.JsonRpcProvider("https://rpc.testnet.arc.network");
    const counts = {};
    const currentBlock = await rp.getBlockNumber();
    const fromBlock = 0;

    for(const ev of LB_EVENTS){
      const topic = ethers.utils.id(ev.sig);
      let logs = [];
      try{
        logs = await rp.getLogs({
          address: ev.addr,
          fromBlock: fromBlock,
          toBlock: currentBlock,
          topics: [topic]
        });
      }catch(e){ console.error("log fetch failed for", ev.sig, e); continue; }

      for(const l of logs){
        // sender is always the first indexed topic (topics[1]) for all our events
        if(l.topics.length < 2) continue;
        const addr = ethers.utils.getAddress("0x" + l.topics[1].slice(26));
        counts[addr] = (counts[addr] || 0) + 1;
      }
    }

    const ranked = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 15);

    bodyEl.innerHTML = "";
    ranked.forEach(([addr, count], i) => {
      const isYou = account && addr.toLowerCase() === account.toLowerCase();
      const tr = document.createElement('tr');
      if(isYou) tr.className = 'you';
      const short = addr.slice(0,6) + "…" + addr.slice(-4) + (isYou ? I18N[LANG].lbYou : "");
      tr.innerHTML = '<td class="rank">#' + (i+1) + '</td><td class="addr">' + short + '</td><td>' + count + '</td>';
      bodyEl.appendChild(tr);
    });

    loadingEl.style.display = 'none';
    tableEl.style.display = ranked.length ? 'table' : 'none';
    if(!ranked.length){
      loadingEl.style.display = 'block';
      loadingEl.textContent = '—';
    }
  }catch(e){
    console.error(e);
    loadingEl.textContent = '—';
  }
}

/* ---------- Staking actions ---------- */
async function doStake(){
  const amt = document.getElementById('stakeAmt').value;
  if(!amt || Number(amt) <= 0){ log(I18N[LANG].invalidAmt, "err"); return; }
  try{
    const wei = toWei(amt);
    await ensureApproval(tARC, ADDR.Staking, wei, "stakeLabel");
    log(I18N[LANG].sendingStake);
    const tx = await staking.stake(wei);
    await tx.wait();
    log(I18N[LANG].stakeOk, "ok");
    await refreshAll();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}
async function doUnstake(){
  try{
    log(I18N[LANG].sendingUnstake);
    const tx = await staking.unstake();
    await tx.wait();
    log(I18N[LANG].unstakeOk, "ok");
    await refreshAll();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}

/* ---------- Swap actions ---------- */
function setDir(dir){
  swapDir = dir;
  document.getElementById('dirAtoB').classList.toggle('active', dir === 'AtoB');
  document.getElementById('dirBtoA').classList.toggle('active', dir === 'BtoA');
}
async function doSwap(){
  const amt = document.getElementById('swapAmt').value;
  if(!amt || Number(amt) <= 0){ log(I18N[LANG].invalidAmt, "err"); return; }
  try{
    const wei = toWei(amt);
    if(swapDir === 'AtoB'){
      await ensureApproval(tARC, ADDR.Swap, wei, "swapALabel");
      log(I18N[LANG].swappingAB);
      const tx = await swap.swapAforB(wei);
      await tx.wait();
    } else {
      await ensureApproval(tUSD, ADDR.Swap, wei, "swapBLabel");
      log(I18N[LANG].swappingBA);
      const tx = await swap.swapBforA(wei);
      await tx.wait();
    }
    log(I18N[LANG].swapOk, "ok");
    await refreshAll();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}

/* ---------- Events ---------- */
document.getElementById('connectBtn').addEventListener('click', connect);
document.getElementById('btnClaim').addEventListener('click', doClaim);
document.getElementById('btnStake').addEventListener('click', doStake);
document.getElementById('btnUnstake').addEventListener('click', doUnstake);
document.getElementById('btnDeposit').addEventListener('click', doDeposit);
document.getElementById('btnWithdraw').addEventListener('click', doWithdraw);
document.getElementById('btnBorrow').addEventListener('click', doBorrow);
document.getElementById('btnRepay').addEventListener('click', doRepay);
document.getElementById('btnSwap').addEventListener('click', doSwap);
document.getElementById('dirAtoB').addEventListener('click', () => setDir('AtoB'));
document.getElementById('dirBtoA').addEventListener('click', () => setDir('BtoA'));

applyI18n();
loadLeaderboard();
setInterval(() => { if(account){ refreshAll(); refreshClaimStatus(); } }, 15000);
setInterval(loadLeaderboard, 60000);
</script>
