<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StableLab — Arc Testnet DeFi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
  :root{
    --bg:#f5f7fa;
    --surface:#ffffff;
    --surface-alt:#eef2f8;
    --border:#dde3ec;
    --text:#0f1b2d;
    --text-mute:#5b6b82;
    --text-faint:#8a97ab;
    --primary:#2f5fe0;
    --primary-dark:#1e3fa8;
    --primary-soft:#e8edfc;
    --ok:#0f9d58;
    --err:#d33b2c;
    --radius:10px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--primary);}
  .wrap{max-width:960px;margin:0 auto;padding:24px 20px 80px;}

  header{
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:8px 0 24px;
    flex-wrap:wrap; gap:16px;
  }
  .brand{display:flex;flex-direction:column;gap:8px;}
  .brand .tag{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:600; letter-spacing:.02em; color:var(--primary);
    text-transform:uppercase;
  }
  h1{
    font-family:var(--sans); font-weight:800; font-size:28px; margin:0;
    letter-spacing:-0.02em; color:var(--text);
  }
  h1 .slash{color:var(--primary);}
  .subtitle{color:var(--text-mute); font-size:13px; max-width:44ch; line-height:1.55;}

  .toprow{display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  .langbar{display:flex; flex-wrap:wrap; justify-content:flex-end; gap:4px; max-width:280px;}
  .langbar button{
    font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:.02em;
    background:var(--surface); border:1px solid var(--border); border-radius:6px;
    padding:5px 9px; cursor:pointer; color:var(--text-mute);
    transition:background .12s, color .12s, border-color .12s;
  }
  .langbar button:hover{ border-color:var(--primary); color:var(--primary); }
  .langbar button.active{background:var(--primary); color:#fff; border-color:var(--primary);}

  #connectBtn{
    font-family:var(--sans); font-weight:600; font-size:13px;
    background:var(--primary); color:#fff;
    border:none; border-radius:8px; padding:10px 18px;
    cursor:pointer; letter-spacing:.01em;
    box-shadow:0 1px 2px rgba(15,27,45,0.08);
    transition:background .12s;
  }
  #connectBtn:hover{background:var(--primary-dark);}
  #connectBtn:disabled{opacity:.6;cursor:default;}
  .act{
    font-family:var(--sans); font-size:12.5px; font-weight:600;
    background:var(--surface); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:9px 14px; cursor:pointer;
    transition:background .12s, border-color .12s;
  }
  .act:hover{background:var(--surface-alt); border-color:var(--primary);}
  .act.primary{background:var(--primary); color:#fff; border-color:var(--primary);}
  .act.primary:hover{background:var(--primary-dark);}
  .act:disabled{opacity:.4; cursor:default;}

  .acct{ font-size:11.5px; color:var(--text-mute); text-align:right; font-family:var(--mono); }
  .acct .netbadge{
    display:inline-block; margin-top:4px; padding:3px 9px; border-radius:20px;
    border:1px solid var(--ok); font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; color:var(--ok); background:rgba(15,157,88,0.08);
  }
  .acct .netbadge.bad{border-color:var(--err); color:var(--err); background:rgba(211,59,44,0.08);}

  .about-box{
    border-radius:var(--radius); background:var(--primary-soft); padding:16px 20px; margin-bottom:24px;
    border:1px solid #d3ddfa;
  }
  .about-title{
    font-weight:700; font-size:13.5px; margin-bottom:5px; color:var(--primary-dark);
  }
  .about-text{ font-size:12.5px; color:#33447a; line-height:1.6; max-width:70ch; }

  .balances-wrap{ margin-bottom:24px; }
  .balances{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
  }
  .balcell{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 18px; box-shadow:0 1px 2px rgba(15,27,45,0.04);
  }
  .balcell .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint); font-weight:600;}
  .balcell .val{
    font-family:var(--sans); font-size:24px; font-weight:700; margin-top:6px; color:var(--text);
    letter-spacing:-0.01em;
  }
  .balances-wrap #btnRefresh{ margin-top:12px; }

  .section{
    border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:16px; background:var(--surface);
    box-shadow:0 1px 2px rgba(15,27,45,0.04);
    overflow:hidden;
  }
  .section .head{
    display:flex; align-items:center; gap:10px;
    padding:14px 20px; border-bottom:1px solid var(--border);
    background:var(--surface-alt);
  }
  .section .head .n{
    display:none;
  }
  .section .head h2{
    font-size:15px; margin:0; font-weight:700; color:var(--text);
  }
  .section .head .desc{
    margin-left:auto; font-size:11.5px; color:var(--text-mute); text-align:right;
  }
  .body{padding:20px;}
  .row{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;
  }
  .row:last-child{margin-bottom:0;}
  input[type=text], input[type=number]{
    font-family:var(--sans); font-size:13.5px;
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:10px 13px; flex:1; min-width:140px; color:var(--text);
    transition:border-color .12s;
  }
  input[type=text]:focus, input[type=number]:focus{
    outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft);
  }
  input::placeholder{color:var(--text-faint);}
  .hint{font-size:11.5px;color:var(--text-faint);margin-top:10px;}
  .stat-line{
    display:flex; justify-content:space-between; font-size:12.5px; padding:8px 0;
    border-bottom:1px solid var(--surface-alt);
  }
  .stat-line:last-of-type{border-bottom:none;}
  .stat-line .k{color:var(--text-mute);}
  .stat-line .v{font-weight:700; color:var(--text); font-family:var(--mono); font-size:12px;}

  .toggle{display:flex; gap:4px; width:fit-content; margin-bottom:16px; background:var(--surface-alt); padding:4px; border-radius:9px;}
  .toggle button{
    font-family:var(--sans); font-size:12px; font-weight:600;
    background:transparent; border:none; border-radius:6px; padding:7px 14px; cursor:pointer; color:var(--text-mute);
    transition:background .12s, color .12s;
  }
  .toggle button.active{background:var(--surface); color:var(--primary); box-shadow:0 1px 2px rgba(15,27,45,0.08);}

  #log{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--text); color:#fff; border-radius:8px;
    font-size:12.5px; padding:11px 20px; display:none; z-index:50;
    box-shadow:0 4px 16px rgba(15,27,45,0.25); max-width:90vw;
  }
  #log.show{display:block;}
  #log.err{background:var(--err);}
  #log.ok{background:var(--ok);}

  .lbtable{width:100%; border-collapse:collapse; font-size:12.5px;}
  .lbtable th{
    text-align:left; text-transform:uppercase; letter-spacing:.04em; font-size:10.5px; font-weight:700;
    color:var(--text-faint); padding:8px 10px; border-bottom:1px solid var(--border);
  }
  .lbtable td{padding:9px 10px; border-bottom:1px solid var(--surface-alt); font-family:var(--mono); font-size:12px;}
  .lbtable tr:last-child td{border-bottom:none;}
  .lbtable .rank{font-family:var(--sans); font-weight:700; color:var(--primary);}
  .lbtable .addr{font-family:var(--mono);}
  .lbtable .you{background:var(--primary-soft);}
  .lbloading{font-size:12px; color:var(--text-faint); padding:8px 0;}

  footer{
    margin-top:32px; padding-top:16px; border-top:1px solid var(--border);
    font-size:11px; color:var(--text-faint); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  footer code{background:var(--surface-alt); padding:2px 6px; border-radius:4px; font-family:var(--mono);}

  @media (max-width:560px){
    h1{font-size:24px;}
    header{flex-direction:column; align-items:flex-start;}
    .toprow{align-items:flex-start;}
    .langbar{justify-content:flex-start;}
    .acct{text-align:left;}
  }

  .feature-strip{
    display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;
  }
  .feature-chip{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--surface); border:1px solid #d3ddfa; border-radius:20px;
    padding:6px 13px; font-size:11.5px; font-weight:600; color:var(--primary-dark);
    text-decoration:none; transition:background .12s, transform .12s;
  }
  .feature-chip:hover{background:var(--primary-soft); transform:translateY(-1px);}
  .fc-dot{width:6px; height:6px; border-radius:50%; background:var(--primary); flex-shrink:0;}

  .layout{ display:flex; gap:24px; align-items:flex-start; }
  .sidenav{
    position:sticky; top:20px; flex:0 0 168px;
    display:flex; flex-direction:column; gap:2px;
  }
  .sidenav a{
    display:block; padding:9px 12px; border-radius:8px;
    font-size:12.5px; font-weight:600; color:var(--text-mute); text-decoration:none;
    border-left:2px solid transparent;
    transition:background .12s, color .12s, border-color .12s;
  }
  .sidenav a:hover{background:var(--surface-alt); color:var(--text);}
  .sidenav a.active{background:var(--primary-soft); color:var(--primary-dark); border-left-color:var(--primary);}
  .content{ flex:1; min-width:0; }

  @media (max-width:760px){
    .layout{ flex-direction:column; }
    .sidenav{
      position:static; flex-direction:row; overflow-x:auto; gap:6px;
      width:100%; padding-bottom:4px; flex:none;
    }
    .sidenav a{ white-space:nowrap; border-left:none; border-bottom:2px solid transparent; }
    .sidenav a.active{ border-left-color:transparent; border-bottom-color:var(--primary); }
  }

  .group-menu{
    position:relative; display:inline-block; margin:22px 0 10px;
  }
  .group-label{
    cursor:pointer; display:flex; align-items:center; gap:5px;
    font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    color:var(--text-faint);
  }
  .group-label:hover{ color:var(--primary); }
  .group-label::before{
    content:"›"; display:inline-block; transform:rotate(90deg); font-size:13px; transition:transform .15s;
  }
  .group-menu:hover .group-label::before{ transform:rotate(180deg); }
  .group-dropdown{
    position:absolute; left:0; top:100%; margin-top:6px; min-width:210px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    box-shadow:0 6px 20px rgba(15,27,45,0.14); padding:6px; z-index:20;
    opacity:0; pointer-events:none; transform:translateY(-4px); transition:opacity .15s, transform .15s;
  }
  .group-menu:hover .group-dropdown{ opacity:1; pointer-events:auto; transform:translateY(0); }
  .group-dropdown a{
    display:block; padding:8px 12px; border-radius:7px; font-size:12.5px; font-weight:600;
    color:var(--text); text-decoration:none; text-transform:none; letter-spacing:normal;
  }
  .group-dropdown a:hover{ background:var(--primary-soft); color:var(--primary-dark); }

  #corporateOnly{ display:block; }

  .teaser-card{
    display:block; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface);
    padding:16px 20px; margin-bottom:12px; text-decoration:none; box-shadow:0 1px 2px rgba(15,27,45,0.04);
    transition:border-color .12s, transform .12s;
  }
  .teaser-card:hover{ border-color:var(--primary); transform:translateX(2px); }
  .teaser-title{ font-weight:700; font-size:14.5px; color:var(--text); margin-bottom:4px; }
  .teaser-desc{ font-size:12.5px; color:var(--text-mute); line-height:1.5; margin-bottom:8px; }
  .teaser-link{ font-size:12px; font-weight:700; color:var(--primary); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="tag" data-i18n="tag"></div>
      <h1>Stable<span class="slash">Lab</span></h1>
      <div class="subtitle" data-i18n="subtitle"></div>
    </div>
    <div class="toprow">
      <div class="langbar" id="langbar">
        <button data-lang="tr">TR</button>
        <button data-lang="en">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="de">DE</button>
        <button data-lang="zh">中文</button>
        <button data-lang="hi">हिं</button>
        <button data-lang="fr">FR</button>
        <button data-lang="sw">SW</button>
      </div>
      <button id="connectBtn" data-i18n="connect"></button>
      <button id="switchNetBtn" class="act" style="display:none;" data-i18n="switchNetBtn"></button>
      <div class="acct" id="acctInfo"></div>
    </div>
  </header>

  <div class="about-box">
    <div class="about-title" data-i18n="aboutTitle"></div>
    <div class="about-text" data-i18n="aboutText"></div>
    <div class="feature-strip">
      <a href="#sec-faucet" class="feature-chip"><span class="fc-dot"></span><span data-i18n="faucetTitle"></span></a>
      <a href="#sec-staking" class="feature-chip"><span class="fc-dot"></span><span data-i18n="stakingTitle"></span></a>
      <a href="#sec-lending" class="feature-chip"><span class="fc-dot"></span><span data-i18n="lendingTitle"></span></a>
      <a href="#sec-swap" class="feature-chip"><span class="fc-dot"></span><span data-i18n="swapTitle"></span></a>
      <a href="./streaming/" class="feature-chip"><span class="fc-dot"></span><span data-i18n="streamTitle"></span></a>
      <a href="./escrow/" class="feature-chip"><span class="fc-dot"></span><span data-i18n="escrowTitle"></span></a>
      <a href="#sec-multisig" class="feature-chip"><span class="fc-dot"></span><span data-i18n="msigTitle"></span></a>
    </div>
  </div>

  <div class="balances-wrap">
    <div class="balances">
      <div class="balcell"><div class="lbl" data-i18n="balArc"></div><div class="val" id="balARC">—</div></div>
      <div class="balcell"><div class="lbl" data-i18n="balUsd"></div><div class="val" id="balUSD">—</div></div>
      <div class="balcell"><div class="lbl" data-i18n="balStaked"></div><div class="val" id="balStaked">—</div></div>
      <div class="balcell"><div class="lbl" data-i18n="balReward"></div><div class="val" id="balReward">—</div></div>
    </div>
    <button id="btnRefresh" class="act" data-i18n="refreshBtn"></button>
  </div>

  <div class="layout">
    <nav class="sidenav" id="sidenav">
      <a href="#sec-faucet" data-target="sec-faucet" data-i18n="faucetTitle"></a>
      <a href="#sec-staking" data-target="sec-staking" data-i18n="stakingTitle"></a>
      <a href="#sec-lending" data-target="sec-lending" data-i18n="lendingTitle"></a>
      <a href="#sec-swap" data-target="sec-swap" data-i18n="swapTitle"></a>
      <a href="./streaming/" data-i18n="streamTitle"></a>
      <a href="./escrow/" data-i18n="escrowTitle"></a>
      <a href="#sec-multisig" data-target="sec-multisig" data-i18n="msigTitle"></a>
    </nav>
    <div class="content">

  <!-- FAUCET -->
  <div class="section" id="sec-faucet">
    <div class="head">
      <h2 data-i18n="faucetTitle"></h2>
      <span class="desc" data-i18n="faucetDesc"></span>
    </div>
    <div class="body">
      <div class="row">
        <button class="act primary" id="btnClaim" data-i18n="claimBtn"></button>
        <span class="hint" id="claimStatus"></span>
      </div>
    </div>
  </div>

  <div class="group-menu">
    <div class="group-label" data-i18n="groupCore"></div>
    <div class="group-dropdown">
      <a href="#sec-staking" data-i18n="stakingTitle"></a>
      <a href="#sec-lending" data-i18n="lendingTitle"></a>
      <a href="#sec-swap" data-i18n="swapTitle"></a>
    </div>
  </div>

  <!-- STAKING -->
  <div class="section" id="sec-staking">
    <div class="head">
      <h2 data-i18n="stakingTitle"></h2>
      <span class="desc" data-i18n="stakingDesc"></span>
    </div>
    <div class="body">
      <div class="row">
        <input type="number" id="stakeAmt" data-i18n-ph="amountArc" />
        <button class="act primary" id="btnStake" data-i18n="stakeBtn"></button>
        <button class="act" id="btnUnstake" data-i18n="unstakeBtn"></button>
      </div>
      <div class="stat-line"><span class="k" data-i18n="yourStaked"></span><span class="v" id="stStaked">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="pendingReward"></span><span class="v" id="stReward">—</span></div>
      <div class="hint" data-i18n="stakeHint"></div>
    </div>
  </div>

  <!-- LENDING -->
  <div class="section" id="sec-lending">
    <div class="head">
      <h2 data-i18n="lendingTitle"></h2>
      <span class="desc" data-i18n="lendingDesc"></span>
    </div>
    <div class="body">
      <div class="row">
        <input type="number" id="collAmt" data-i18n-ph="collateralAmount" />
        <button class="act primary" id="btnDeposit" data-i18n="depositBtn"></button>
        <button class="act" id="btnWithdraw" data-i18n="withdrawBtn"></button>
      </div>
      <div class="row">
        <input type="number" id="borrowAmt" data-i18n-ph="amountArc" />
        <button class="act primary" id="btnBorrow" data-i18n="borrowBtn"></button>
        <button class="act" id="btnRepay" data-i18n="repayBtn"></button>
      </div>
      <div class="stat-line"><span class="k" data-i18n="yourCollateral"></span><span class="v" id="lnColl">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="yourDebt"></span><span class="v" id="lnBorrow">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="maxBorrow"></span><span class="v" id="lnMax">—</span></div>
    </div>
  </div>

  <!-- SWAP -->
  <div class="section" id="sec-swap">
    <div class="head">
      <h2 data-i18n="swapTitle"></h2>
      <span class="desc" data-i18n="swapDesc"></span>
    </div>
    <div class="body">
      <div class="toggle">
        <button id="dirAtoB" class="active">tARC → tUSD</button>
        <button id="dirBtoA">tUSD → tARC</button>
      </div>
      <div class="row">
        <input type="number" id="swapAmt" data-i18n-ph="amountToGive" />
        <button class="act primary" id="btnSwap" data-i18n="swapBtn"></button>
      </div>
      <div class="stat-line"><span class="k" data-i18n="youWillGet"></span><span class="v" id="swapPreview">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="poolArc"></span><span class="v" id="swReserveA">—</span></div>
      <div class="stat-line"><span class="k" data-i18n="poolUsd"></span><span class="v" id="swReserveB">—</span></div>
      <div class="hint" data-i18n="swapHint"></div>
    </div>
  </div>

  <div id="corporateOnly">
    <div class="group-menu">
      <div class="group-label" data-i18n="groupTreasury"></div>
      <div class="group-dropdown">
        <a href="./streaming/" data-i18n="streamTitle"></a>
        <a href="./escrow/" data-i18n="escrowTitle"></a>
        <a href="#sec-multisig" data-i18n="msigTitle"></a>
      </div>
    </div>

    <!-- STREAMING (teaser) -->
    <a class="teaser-card" href="./streaming/">
      <div class="teaser-title" data-i18n="streamTitle"></div>
      <div class="teaser-desc" data-i18n="streamDesc"></div>
      <div class="teaser-link" data-i18n="teaserLink"></div>
    </a>

    <!-- ESCROW (teaser) -->
    <a class="teaser-card" href="./escrow/">
      <div class="teaser-title" data-i18n="escrowTitle"></div>
      <div class="teaser-desc" data-i18n="escrowDesc"></div>
      <div class="teaser-link" data-i18n="teaserLink"></div>
    </a>

    <!-- MULTISIG -->
    <div class="section" id="sec-multisig">
      <div class="head">
        <h2 data-i18n="msigTitle"></h2>
        <span class="desc" data-i18n="msigDesc"></span>
      </div>
      <div class="body">
        <div class="row">
          <input type="number" id="msigDepositAmt" data-i18n-ph="amountArc" />
          <button class="act primary" id="btnMsigDeposit" data-i18n="depositBtn"></button>
        </div>
        <div class="row">
          <input type="text" id="msigTo" data-i18n-ph="recipientAddr" />
          <input type="number" id="msigAmount" data-i18n-ph="amountArc" />
          <button class="act primary" id="btnMsigPropose" data-i18n="proposeBtn"></button>
        </div>
        <div class="row" style="margin-top:14px;">
          <input type="number" id="msigProposalId" data-i18n-ph="proposalId" />
          <button class="act" id="btnMsigCheck" data-i18n="checkBtn"></button>

let LANG = localStorage.getItem('lang') || 'tr';

function applyI18n(){
  const dict = I18N[LANG];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(dict[key] !== undefined) el.textContent = dict[key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const key = el.getAttribute('data-i18n-ph');
    if(dict[key] !== undefined) el.setAttribute('placeholder', dict[key]);
  });
  document.querySelectorAll('[data-preview]').forEach(el=>{
    const key = el.getAttribute('data-preview');
    if(dict[key] !== undefined) el.setAttribute('data-preview-text', dict[key]);
  });
  document.querySelectorAll('#langbar button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang') === LANG);
  });
  document.documentElement.lang = LANG;
  if(account) updateAcctInfo();
  if(Object.keys(lbLastCounts).length || Object.keys(lbLastVolume).length || Object.keys(lbLastReward).length) renderLeaderboard();
}
document.getElementById('langbar').addEventListener('click', (e)=>{
  const btn = e.target.closest('button[data-lang]');
  if(!btn) return;
  LANG = btn.getAttribute('data-lang');
  localStorage.setItem('lang', LANG);
  applyI18n();
});

function fmt(bn){
  try{ return Number(ethers.utils.formatUnits(bn, 18)).toLocaleString(undefined, {maximumFractionDigits: 4}); }
  catch(e){ return "—"; }
}
function toWei(v){ return ethers.utils.parseUnits(String(v || "0"), 18); }
async function ensureApproval(token, spender, amountWei, labelKey){

/* ---------- Read data ---------- */
async function refreshAll(){
  if(!account) return;
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  const safeCall = async (fn) => {
    for(let attempt = 0; attempt < 3; attempt++){
      try{ return await fn(); }
      catch(e){
        if(attempt < 2){ await wait(1500 * (attempt + 1)); continue; }
        console.error(e);
        return null;
      }
    }
  };
  try{
    const bArc = await safeCall(() => tARC.balanceOf(account)); await wait(150);
    const bUsd = await safeCall(() => tUSD.balanceOf(account)); await wait(150);
    const staked = await safeCall(() => staking.stakedBalance(account)); await wait(150);
    const reward = await safeCall(() => staking.calculateReward(account)); await wait(150);
    const coll = await safeCall(() => lending.collateralBalance(account)); await wait(150);
    const borrowed = await safeCall(() => lending.borrowedBalance(account)); await wait(150);
    const factor = await safeCall(() => lending.COLLATERAL_FACTOR()); await wait(150);
    const rA = await safeCall(() => swap.reserveA()); await wait(150);
    const rB = await safeCall(() => swap.reserveB());

    if(bArc) document.getElementById('balARC').textContent = fmt(bArc);
    if(bUsd) document.getElementById('balUSD').textContent = fmt(bUsd);
    if(staked) document.getElementById('balStaked').textContent = fmt(staked);
    if(reward) document.getElementById('balReward').textContent = fmt(reward);

    if(staked) document.getElementById('stStaked').textContent = fmt(staked) + " tARC";
    if(reward) document.getElementById('stReward').textContent = fmt(reward) + " tARC";

    if(coll) document.getElementById('lnColl').textContent = fmt(coll) + " tARC";
    if(borrowed) document.getElementById('lnBorrow').textContent = fmt(borrowed) + " tARC";
    if(coll && factor){
      const maxBorrow = coll.mul(factor).div(100);
      document.getElementById('lnMax').textContent = fmt(maxBorrow) + " tARC";
    }

    if(rA) document.getElementById('swReserveA').textContent = fmt(rA) + " tARC";
    if(rB) document.getElementById('swReserveB').textContent = fmt(rB) + " tUSD";
  }catch(e){
    console.error(e);
  }
}

/* ---------- Leaderboard ---------- */
async function loadLeaderboard(){
  const loadingEl = document.getElementById('lbLoading');
  const tableEl = document.getElementById('lbTable');
  const bodyEl = document.getElementById('lbBody');
  try{
    // Ayrı bir RPC bağlantısı kullanılıyor ki cüzdanın (Rabby) bakiye sorgularıyla aynı istek kotasını paylaşmasın
    const rp = new ethers.providers.JsonRpcProvider("https://rpc.testnet.arc.network");
    const counts = {}, volume = {}, reward = {};
    const currentBlock = await rp.getBlockNumber();
    const fromBlock = Math.max(0, currentBlock - 9000); // RPC 10k blok / rate-limit sınırına takılmamak için son ~9000 blokla sınırlı

    for(const ev of LB_EVENTS){
      const iface = new ethers.utils.Interface([ev.frag]);
      const topic = ethers.utils.id(ev.sig);
      let logs = [];
      try{
        logs = await rp.getLogs({
          address: ev.addr,
          fromBlock: fromBlock,
          toBlock: currentBlock,
          topics: [topic]
        });
      }catch(e){ console.error("log fetch failed for", ev.sig, e); continue; }

      for(const l of logs){
        if(l.topics.length < 2) continue;
        const addr = ethers.utils.getAddress("0x" + l.topics[1].slice(26));
        counts[addr] = (counts[addr] || 0) + 1;
        try{
          const parsed = iface.parseLog(l);
          if(ev.volumeField && parsed.args[ev.volumeField]){
            const v = parsed.args[ev.volumeField];
            volume[addr] = (volume[addr] || ethers.BigNumber.from(0)).add(v);
          }
          if(ev.rewardField && parsed.args[ev.rewardField]){
            const r = parsed.args[ev.rewardField];
            reward[addr] = (reward[addr] || ethers.BigNumber.from(0)).add(r);
          }
        }catch(e){ /* decode hatası - o log'u atla */ }
      }
      await new Promise(r => setTimeout(r, 250)); // RPC'yi art arda yormamak için küçük bekleme
    }

    lbLastCounts = counts; lbLastVolume = volume; lbLastReward = reward;
    renderLeaderboard();
    loadingEl.style.display = 'none';
  }catch(e){
    console.error(e);
    loadingEl.textContent = '—';
  }
}

function renderLeaderboard(){
  const loadingEl = document.getElementById('lbLoading');
  const tableEl = document.getElementById('lbTable');
  const bodyEl = document.getElementById('lbBody');
  const colHeaderEl = document.getElementById('lbColHeader');

  let source, colKey, formatVal;
  if(lbSortMode === 'volume'){
    source = lbLastVolume; colKey = 'lbColVolume';
    formatVal = (v) => fmt(v);
  } else if(lbSortMode === 'reward'){
    source = lbLastReward; colKey = 'lbColReward';
    formatVal = (v) => fmt(v);
  } else {
    source = lbLastCounts; colKey = 'lbActions';
    formatVal = (v) => String(v);
  }
  colHeaderEl.textContent = I18N[LANG][colKey];

  const entries = Object.entries(source).filter(([,v]) => v && (typeof v === 'number' ? v > 0 : !v.isZero()));
  const ranked = entries.sort((a,b) => {
    if(typeof a[1] === 'number') return b[1] - a[1];
    return b[1].gt(a[1]) ? 1 : (b[1].lt(a[1]) ? -1 : 0);
  }).slice(0, 15);

  bodyEl.innerHTML = "";
  ranked.forEach(([addr, val], i) => {
    const isYou = account && addr.toLowerCase() === account.toLowerCase();
    const tr = document.createElement('tr');
    if(isYou) tr.className = 'you';
    const short = addr.slice(0,6) + "…" + addr.slice(-4) + (isYou ? I18N[LANG].lbYou : "");
    tr.innerHTML = '<td class="rank">#' + (i+1) + '</td><td class="addr">' + short + '</td><td>' + formatVal(val) + '</td>';
    bodyEl.appendChild(tr);
  });

  tableEl.style.display = ranked.length ? 'table' : 'none';
  if(!ranked.length){
    loadingEl.style.display = 'block';
    loadingEl.textContent = '—';
  } else {
    loadingEl.style.display = 'none';
  }
}

  clearTimeout(swapPreviewTimer);

  const id = document.getElementById('dealIdInput').value;
  if(id === "" || id === null){ log(I18N[LANG].invalidAmt, "err"); return; }
  try{
    log(I18N[LANG].dealRefunding);
    const tx = await escrow.refund(id);
    await tx.wait();
    log(I18N[LANG].dealRefunded, "ok");
    await refreshAll();
    await doDealCheck();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}

/* ---------- MultiSig ---------- */
async function doMsigDeposit(){
  const amt = document.getElementById('msigDepositAmt').value;
  if(!amt || Number(amt) <= 0){ log(I18N[LANG].invalidAmt, "err"); return; }
  try{
    const wei = toWei(amt);
    await ensureApproval(tARC, ADDR.MultiSig, wei, "msigLabel");
    log(I18N[LANG].msigDepositing);
    const tx = await multisig.deposit(wei);
    await tx.wait();
    log(I18N[LANG].msigDepositOk, "ok");
    await refreshAll();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}
async function doMsigPropose(){
  const to = document.getElementById('msigTo').value.trim();
  const amt = document.getElementById('msigAmount').value;
  if(!ethers.utils.isAddress(to)){ log(I18N[LANG].invalidAddr, "err"); return; }
  if(!amt || Number(amt) <= 0){ log(I18N[LANG].invalidAmt, "err"); return; }
  try{
    log(I18N[LANG].msigProposing);
    const tx = await multisig.proposeTransfer(to, toWei(amt));
    await tx.wait();
    log(I18N[LANG].msigProposed, "ok");
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}
async function doMsigCheck(){
  try{
    const req = await multisig.required();
    document.getElementById('msigRequiredVal').textContent = req.toString();
    const id = document.getElementById('msigProposalId').value;
    if(id !== "" && id !== null){
      const p = await multisig.proposals(id);
      document.getElementById('msigProposalVal').textContent =
        p.to.slice(0,6) + "…" + p.to.slice(-4) + " · " + fmt(p.amount) + " tARC · " +
        p.confirmations.toString() + "/" + req.toString() + (p.executed ? " ✓" : "");
    }
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}
async function doMsigConfirm(){
  const id = document.getElementById('msigProposalId').value;
  if(id === "" || id === null){ log(I18N[LANG].invalidAmt, "err"); return; }
  try{
    log(I18N[LANG].msigConfirming);
    const tx = await multisig.confirm(id);
    await tx.wait();
    log(I18N[LANG].msigConfirmed, "ok");
    await doMsigCheck();
  }catch(e){ log(I18N[LANG].txFailed + (e.reason || e.message || e), "err"); }
}

/* ---------- Sidenav scroll-spy ---------- */
(function(){
  const links = document.querySelectorAll('.sidenav a');
  const sections = Array.from(links).map(a => document.getElementById(a.getAttribute('data-target'))).filter(Boolean);
  if(!sections.length) return;
  const setActive = (id) => {
    links.forEach(a => a.classList.toggle('active', a.getAttribute('data-target') === id));
  };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting) setActive(entry.target.id);
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => observer.observe(s));
  setActive(sections[0].id);
})();
